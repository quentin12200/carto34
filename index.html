<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte CGT - Voix Syndicales</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
  body {
    font-family: 'Segoe UI', 'Arial', sans-serif;
    background-color: #fdf8f6;
    color: #222;
    text-align: center;
    padding: 1em;
    margin: 0;
  }
  header {
    display:flex;
    align-items:center;
    justify-content:flex-start;
    margin-bottom:1em;
    background:#fff;
    border:2px solid #b00000;
    border-radius:12px;
    padding:0.6em 1em;
    box-shadow:0 2px 12px #b0000033;
  }
  header img {
    height:54px;
    margin-right:18px;
    border-radius:10px;
    box-shadow:0 2px 8px #b0000050;
  }
  h2 {
    margin:0;
    font-family:'Arial Black','Segoe UI',sans-serif;
    font-size:2.1em;
    color:#b00000;
    letter-spacing:1px;
    text-shadow:1px 1px 0 #fff,2px 2px 0 #b0000022;
  }
    #map {
      height: 70vh;
      width: 65%;
      border: 3px solid #b00000;
      box-shadow: 0 2px 18px #b0000050;
      border-radius: 18px;
      margin-bottom: 1.5em;
    }
    #details-panel {
      width: 30%;
      height: 70vh;
      background: #fff;
      border: 2px solid #b00000;
      border-radius: 12px;
      padding: 1em;
      overflow-y: auto;
      box-shadow: 0 2px 18px #b0000050;
      text-align: left;
    }
    #details-content {
      text-align: left;
    }
    #map-container {
      display: flex;
      gap: 1em;
      justify-content: center;
      align-items: flex-start;
    }
    #syndicat-filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5em;
      margin-bottom: 0.7em;
    }
    #syndicat-filters button, #syndicat-filters select {
      font-size: 1em;
      padding: 0.45em 1.2em;
      border-radius: 20px;
      border: 1.5px solid #b00000;
      background: #fff;
      color: #b00000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border 0.15s;
      outline: none;
      margin-bottom: 0.2em;
    }
    #syndicat-filters button:hover, #syndicat-filters select:focus {
      background: #b00000;
      color: #fff;
      border-color: #b00000;
    }
    #syndicat-filters button.active {
      background: #b00000;
      color: #fff;
      border-color: #b00000;
    }
    #syndicat-filters select {
      min-width: 170px;
      border-radius: 10px;
      border: 1.5px solid #b00000;
      color: #b00000;
      background: #fff;
      font-weight: 500;
    }
    #syndicat-stats {
      background: #fff7f7;
      border: 1.5px solid #b00000;
      border-radius: 12px;
      display: inline-block;
      padding: 0.7em 1.5em;
      margin-bottom: 1em;
      font-size: 1.12em;
      color: #b00000;
      min-width: 280px;
      box-shadow: 0 2px 10px #b0000022;
    }
    .info.legend {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #b00000;
      padding: 0.8em 1.2em 0.5em 1.2em;
      font-size: 1em;
      color: #222;
      box-shadow: 0 2px 10px #b0000022;
      text-align: left;
      min-width: 120px;
    }
    .info.legend i {
      border-radius: 50%;
      display: inline-block;
      width: 13px;
      height: 13px;
      margin-right: 7px;
      vertical-align: middle;
      border: 1px solid #ccc;
    }
    @media (max-width: 1200px) {
      #map-container { flex-direction: column; }
      #map { width: 100%; height: 50vh; }
      #details-panel { width: 100%; height: 40vh; }
    }
    @media (max-width: 700px) {
      #map { height: 45vh; }
      #details-panel { height: 35vh; }
      #syndicat-stats { font-size: 0.97em; min-width: 120px; }
      #syndicat-filters { gap: 0.2em; }
      .info.legend { font-size: 0.85em; min-width: 80px; }
      h2 { font-size: 1.2em; }
    }
  </style>
  <style>
    body {
      background: linear-gradient(120deg,#fff 0%,#fdf4f4 60%,#ffecec 100%);
    }
    #ux-bar input:focus {
      background: #fff6f6;
      border-color: #b00000;
      color: #b00000;
    }
    #export-btn:hover {
      background: #b00000;
      color: #fff;
    }
    #table-container table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px #b0000022;
      overflow: hidden;
    }
    #table-container th, #table-container td {
      border: 1px solid #b00000;
      padding: 0.45em 0.8em;
      text-align: left;
      font-size: 1em;
    }
    #table-container th {
      background: #b00000;
      color: #fff;
      font-weight: bold;
      text-transform: uppercase;
    }
    #table-container tr:nth-child(even) { background: #fff3f3; }
    #table-container tr:hover { background: #ffeaea; }
    @media (max-width: 700px) {
      #ux-bar { flex-direction: column; gap:0.7em; }
      #table-container th, #table-container td { font-size: 0.92em; padding: 0.3em 0.5em; }
      #table-container { font-size: 0.95em; }
    }
  </style>
</head>
<body>
  <div id="password-modal" style="position:fixed;z-index:99999;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.97);display:flex;align-items:center;justify-content:center;flex-direction:column;">
    <div style="background:#fff;border:2px solid #b00000;border-radius:14px;padding:2em;box-shadow:0 4px 24px #b0000040;min-width:300px;text-align:center;">
      <h2 style="color:#b00000;margin-bottom:1em;">Accès protégé</h2>
      <input id="password-input" type="password" placeholder="Mot de passe" style="font-size:1.1em;padding:0.5em 1em;border-radius:8px;border:1.5px solid #b00000;outline:none;margin-bottom:1em;width:90%;max-width:250px;" autofocus />
      <br>
      <button id="password-submit" style="background:#b00000;color:#fff;font-weight:bold;padding:0.5em 2em;border-radius:8px;border:none;font-size:1.1em;cursor:pointer;">Valider</button>
      <div id="password-error" style="color:#b00000;margin-top:1em;display:none;">Mot de passe incorrect</div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var modal = document.getElementById('password-modal');
      var input = document.getElementById('password-input');
      var btn = document.getElementById('password-submit');
      var error = document.getElementById('password-error');
      function checkPassword() {
        if(input.value === 'VS34000') {
          modal.style.display = 'none';
          document.body.style.overflow = '';
        } else {
          error.style.display = '';
          input.value = '';
          input.focus();
        }
      }
      btn.addEventListener('click', checkPassword);
      input.addEventListener('keyup', function(e) {
        if(e.key === 'Enter') checkPassword();
      });
      input.focus();
      document.body.style.overflow = 'hidden';
    });
  </script>
  <header>
    <img src="logoud34.jpg" alt="Logo CGT">
    <h2>Carte CGT - Voix Syndicales en Hérault</h2>

  <div id="syndicat-filters" style="margin-bottom: 1em;">

  <div id="orga-voix-total" style="margin-bottom:0.5em;font-size:1.25em;color:#b00000;font-weight:bold;"></div>
  <div id="syndicat-stats" style="margin-bottom:1em;font-size:1.1em;color:#333;"></div>
  <div id="map-container">
    <div id="map"></div>
    <div id="details-panel">
      <h3 style="color: #b00000; margin-top: 0;">Détails de l'établissement</h3>
      <div id="details-content">
        <p style="color: #666; font-style: italic;">Cliquez sur un point de la carte pour voir les détails</p>

  <div id="error-message" style="color: red; font-weight: bold; display: none;"></div>

  <div id="table-container" style="margin:0 auto 0 auto;width:100%;max-width:none;overflow-x:visible;"></div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="ul.js"></script>
  <script>
    // --- Barre de recherche, tableau et export ---
    let filteredFeatures = [];
    // Affiche le contenu du CSV voixcgt12.csv dans le tableau du bas
    // --- Gestion du tableau CSV, recherche, tri, stats ---
    let csvData = [];
    let csvHeaders = [];
    let currentOrga = null;

    function updateOrgaVoixTotal(organisation) {
      if (!organisation || !csvData.length) {
        document.getElementById('orga-voix-total').innerHTML = '';
        return;
      }
      // Somme des voix pour l'orga sélectionnée
      let total = 0;
      const siretSet = new Set();
      csvData.forEach(row => {
        const voix = parseFloat(row[organisation] || 0);
        total += voix;
        if (voix > 0 && row['SIRET']) {
          siretSet.add(row['SIRET']);
        }
      });
      document.getElementById('orga-voix-total').innerHTML = `
        <span style='margin-right:1.5em;'>Total voix <b>${organisation}</b> : <span style="color:#222">${total.toLocaleString('fr-FR')}</span></span>
        <span>Entreprises implantées : <b style='color:#222'>${siretSet.size}</b></span>
      `;
    }

    function displayCSVTable(filterText = '') {
      if (!csvData.length) return;
      let filtered = csvData;
      if (filterText) {
        const t = filterText.toLowerCase();
        filtered = csvData.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(t)));
      }
      // Tri décroissant sur "Inscrits"
      filtered = filtered.slice().sort((a, b) => parseFloat(b['Inscrits']||0) - parseFloat(a['Inscrits']||0));
      let html = '<table style="width:100%;border-collapse:collapse;background:#fff;border-radius:6px;box-shadow:0 1px 6px #b0000020;margin:0;">';
      html += '<thead><tr>' + csvHeaders.map(h=>`<th style="background:#b00000;color:#fff;padding:6px 8px;">${h}</th>`).join('') + '</tr></thead><tbody>';
      filtered.forEach(row => {
        html += '<tr>' + csvHeaders.map((h,j)=>`<td style="padding:5px 8px;border-bottom:1px solid #eee;">${row[h]||''}</td>`).join('') + '</tr>';
      });
      html += '</tbody></table>';
      document.getElementById('table-container').innerHTML = html;
    }

    function parseCSV(csv) {
      const lines = csv.split(/\r?\n/).filter(l=>l.trim().length>0);
      if (lines.length === 0) return;
      csvHeaders = lines[0].split(';');
      csvData = lines.slice(1).map(line => {
        const cells = line.split(';');
        const obj = {};
        csvHeaders.forEach((h, i) => obj[h] = cells[i] ?? '');
        return obj;
      });
    }

    // Recherche dynamique
    document.addEventListener('DOMContentLoaded', function() {
      // CSV file loading removed - file does not exist
      // fetch('voixcgt12.csv')
      //   .then(response => response.text())
      //   .then(csv => {
      //     parseCSV(csv);
      //     displayCSVTable();
      //   });
      let tableSearch = document.getElementById('table-search');
if (tableSearch) {
  tableSearch.addEventListener('input', function(e) {
    displayCSVTable(e.target.value);
  });
}
    });


    // Export CSV
    function exportTableToCSV() {
      if (!filteredFeatures || filteredFeatures.length === 0) return alert('Aucune donnée à exporter.');
      let cols = ['SIRET','Nom','Adresse','FD','Commune','CGT','CFDT','CGT-FO','CFTC','CFE-CGC','SOLIDAIRES','UNSA','AUTRES'];
      let csv = cols.join(',') + '\n';
      filteredFeatures.forEach(f => {
        const p = f.properties;
        csv += cols.map(c => '"'+((p[c]||'').toString().replace(/"/g,'""'))+'"').join(',') + '\n';
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'entreprises_filtrees.csv';
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }
    window.exportTableToCSV = exportTableToCSV;
    // Recherche dynamique
    document.addEventListener('DOMContentLoaded', function() {
  let searchInput = document.getElementById('search-bar');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      filterAndDisplay();
    });
  }
});
    // Fonction centrale pour filtrer selon syndicat, FD, recherche
    function filterAndDisplay() {
      let searchInput = document.getElementById('search-bar');
let query = searchInput ? (searchInput.value||'').toLowerCase() : '';
      let features = [];
      if (window.currentFD && window.voixData) {
        features = window.voixData.features.filter(f => f.properties['FD'] === window.currentFD);
      } else if (window.currentSyndicat && window.currentSyndicat !== 'ALL' && window.voixData) {
        features = window.voixData.features.filter(f => parseFloat(f.properties[window.currentSyndicat]||0) > 0);
      } else if (window.voixData) {
        features = window.voixData.features;
      }
      // Recherche sur plusieurs champs
      if (query) {
        features = features.filter(f => {
          const p = f.properties;
          return ['SIRET','Nom','Adresse','FD','Commune'].some(k => (p[k]||'').toString().toLowerCase().includes(query));
        });
      }
      filteredFeatures = features;
  // updateTable(features); // Tableau géré séparément par le CSV
}
    window.filterAndDisplay = filterAndDisplay;
  </script>
  <script>
    const map = L.map('map');

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Ajout du contour du département de l'Hérault
    fetch("departement-34-herault.geojson")
      .then(response => response.json())
      .then(dep => {
        const depLayer = L.geoJSON(dep, {
          style: {
            color: "#b00000",
            weight: 3,
            fillOpacity: 0
          }
        }).addTo(map);
        map.fitBounds(depLayer.getBounds()); // Centrage sur le département
      })
      .catch(error => {
        console.error("Erreur lors du chargement du GeoJSON du département:", error);
        alert("Erreur lors du chargement du contour du département d'Hérault.");
      });

    // Ajout des communes de l'Hérault
    fetch("communes-34-herault.geojson")
      .then(response => response.json())
      .then(communes => {
        L.geoJSON(communes, {
          style: {
            color: "#999999",
            weight: 0.5,
            fillOpacity: 0
          }
        }).addTo(map);
      })
      .catch(error => {
        console.error("Erreur lors du chargement du GeoJSON des communes:", error);
        alert("Erreur lors du chargement des communes.");
      });

    // --- Affichage multi-couches syndicats ---
    const syndicatColors = {
      "CGT": "#b00000",
      "CFDT": "#ff8000",
      "CGT-FO": "#0066cc",
      "CFTC": "#008080",
      "CFE-CGC": "#800080",
      "SOLIDAIRES": "#e6007e",
      "UNSA": "#00bfff",
      "AUTRES": "#aaaaaa"
    };

    let syndicatLayers = {};
    let allLayerGroup = null;
    let voixData = null;
    let fdLayer = null;
    let currentFD = null;
    let allFDs = [];
    let fdStats = null;
    let currentSyndicat = 'ALL'; // pour filtrage tableau
    window.currentSyndicat = currentSyndicat;
    window.currentFD = currentFD;
    fetch("pv34complet_points_coord_etablissements_clean_points.geojson")
      .then(response => response.json())
      .then(data => {
        // Stocker les données dans une variable globale pour les carences
        window.geoJsonData = data;
        window.voixData = data; // pour accès global filtre tableau
        filterAndDisplay(); // affichage initial du tableau
        voixData = data;
        // Extraire toutes les FD uniques pour la liste déroulante
        const fdSet = new Set();
        data.features.forEach(f => {
          if (f.properties['FD']) fdSet.add(f.properties['FD']);
        });
        allFDs = Array.from(fdSet).sort();
        const fdSelect = document.getElementById('fd-select');
        fdSelect.innerHTML = '<option value="">--Choisir une FD--</option>' + allFDs.map(fd => `<option value="${fd}">${fd}</option>`).join('');
        // Fonction popup générique
        function bindPopupSyndicat(feature, layer) {
          let popupContent = "<div style='max-height: 400px; overflow-y: auto; font-size: 0.9em; color: #b00000;'><strong>Informations complètes :</strong><br><br>";
          
          // Organiser les propriétés par catégories
          const props = feature.properties;
          
          // Informations générales
          popupContent += "<strong style='color: #b00000; font-size: 1.1em;'>🏢 ENTREPRISE</strong><br>";
          if (props['Raison sociale']) popupContent += `<strong>Raison sociale:</strong> ${props['Raison sociale']}<br>`;
          if (props['SIRET']) popupContent += `<strong>SIRET:</strong> ${props['SIRET']}<br>`;
          if (props['Adresse']) popupContent += `<strong>Adresse:</strong> ${props['Adresse']}<br>`;
          if (props['CP']) popupContent += `<strong>Code postal:</strong> ${props['CP']}<br>`;
          if (props['Ville']) popupContent += `<strong>Ville:</strong> ${props['Ville']}<br>`;
          if (props['Département']) popupContent += `<strong>Département:</strong> ${props['Département']}<br>`;
          if (props['Région']) popupContent += `<strong>Région:</strong> ${props['Région']}<br>`;
          
          popupContent += "<br><strong style='color: #b00000; font-size: 1.1em;'>📋 ÉLECTION</strong><br>";
          if (props['Type']) popupContent += `<strong>Type:</strong> ${props['Type']}<br>`;
          if (props['Date']) popupContent += `<strong>Date:</strong> ${props['Date']}<br>`;
          if (props['Numero PV']) popupContent += `<strong>N° PV:</strong> ${props['Numero PV']}<br>`;
          if (props['FD']) popupContent += `<strong>Fédération:</strong> ${props['FD']}<br>`;
          if (props['IDCC']) popupContent += `<strong>IDCC:</strong> ${props['IDCC']}<br>`;
          if (props['Lib IDCC']) popupContent += `<strong>Convention:</strong> ${props['Lib IDCC']}<br>`;
          
          popupContent += "<br><strong style='color: #b00000; font-size: 1.1em;'>🗳️ PARTICIPATION</strong><br>";
          if (props['Coll']) popupContent += `<strong>Collège:</strong> ${props['Coll']}<br>`;
          if (props['Inscrits']) popupContent += `<strong>Inscrits:</strong> ${props['Inscrits']}<br>`;
          if (props['Votants']) popupContent += `<strong>Votants:</strong> ${props['Votants']}<br>`;
          if (props['sve_total']) popupContent += `<strong>Suffrages exprimés:</strong> ${props['sve_total']}<br>`;
          
          popupContent += "<br><strong style='color: #b00000; font-size: 1.1em;'>📊 RÉSULTATS SYNDICAUX (%)</strong><br>";
          const syndicats = ['CGT', 'CFDT', 'CGT-FO', 'CFTC', 'CFE-CGC', 'SOLIDAIRES', 'UNSA', 'AUTRES'];
          syndicats.forEach(synd => {
            if (props[synd] !== undefined && props[synd] !== null) {
              const pourcentage = parseFloat(props[synd] || 0);
              const voix = props['sve_total'] ? Math.round(pourcentage * parseFloat(props['sve_total']) / 100) : 0;
              popupContent += `<strong>${synd}:</strong> ${pourcentage}% (${voix} voix)<br>`;
            }
          });
          
          // Coordonnées techniques
          popupContent += "<br><strong style='color: #b00000; font-size: 1.1em;'>📍 COORDONNÉES</strong><br>";
          if (props['coordonneeLambertAbscisseEtablissement']) popupContent += `<strong>Lambert X:</strong> ${props['coordonneeLambertAbscisseEtablissement']}<br>`;
          if (props['coordonneeLambertOrdonneeEtablissement']) popupContent += `<strong>Lambert Y:</strong> ${props['coordonneeLambertOrdonneeEtablissement']}<br>`;
          
          popupContent += "</div>";
          // Au lieu d'un popup, afficher dans le panneau de droite
          layer.on('click', function() {
            document.getElementById('details-content').innerHTML = popupContent;
          });
          
          // Aussi lier le popup pour compatibilité
          layer.bindPopup(popupContent, {maxWidth: 400, maxHeight: 300});
}
        window.bindPopupSyndicat = bindPopupSyndicat; // Rendre la fonction globale pour Leaflet
        // Créer une couche pour tous les points (sans filtrage) - au premier plan
        const allPointsLayer = L.geoJSON(data, {
          pointToLayer: function(feature, latlng) {
            // Déterminer le syndicat majoritaire pour ce point
            const syndicatVoix = {};
            Object.keys(syndicatColors).forEach(syndicat => {
              const voix = parseFloat(feature.properties[syndicat] || 0);
              if (!isNaN(voix)) syndicatVoix[syndicat] = voix;
            });
            let maxSyndicat = 'AUTRES';
            let maxVoix = -1;
            Object.entries(syndicatVoix).forEach(([syndicat, voix]) => {
              if (voix > maxVoix) {
                maxVoix = voix;
                maxSyndicat = syndicat;
              }
            });
            return L.circleMarker(latlng, {
              radius: 8,
              fillColor: syndicatColors[maxSyndicat] || '#aaaaaa',
              color: "#333",
              weight: 1,
              opacity: 1,
              fillOpacity: 0.7
            });
          },
          onEachFeature: function(feature, layer) {
            bindPopupSyndicat(feature, layer);
            // Ajouter des effets de survol
            layer.on('mouseover', function() {
              layer.setStyle({
                radius: 10,
                fillOpacity: 0.9,
                weight: 2
              });
            });
            layer.on('mouseout', function() {
              layer.setStyle({
                radius: 8,
                fillOpacity: 0.7,
                weight: 1
              });
            });
          },
          // Mettre les points au premier plan
          pane: 'markerPane'
        });
        
        // Créer les couches par syndicat (pour les filtres) - au premier plan
        Object.keys(syndicatColors).forEach(syndicat => {

          html = `<div class='table-responsive'><table id='pv-table'><thead><tr>`;

                html.replace(/^[\s\S]*<div class='table-responsive'>|<\/div>\s*$/g, '') +
              '</div>' +
            '</div>';

      .scrollbar-top::-webkit-scrollbar-thumb {background:#b00000;border-radius:8px;}
      .scrollbar-top { scrollbar-color: #b00000 #ffeaea; scrollbar-width: thin; }
      .table-responsive {overflow-x:auto; width:100%; margin:0 auto;}

      #pv-table {font-family:Segoe UI,Arial,sans-serif; font-size:0.96em; border-collapse:collapse; min-width:1800px; width:max-content; background:#fff;}
      .pv-th, .pv-td {border:1px solid #e2e2e2; padding:6px 9px; text-align:left; max-width:260px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
      .pv-th {background:#ffeaea; position:sticky; top:0; z-index:2;}
      .pv-th-important {background:#ffd4d4; color:#b00000; font-weight:bold;}
      .pv-td-important {font-weight:bold; color:#8c0c0c; background:#fff7f7;}
      .pv-tr-even {background:#fff;}
      .pv-tr-odd {background:#f8f8f8;}
      #pv-table tr:hover {background:#ffeaea; transition:background 0.2s;}
      #pv-table thead tr {box-shadow:0 2px 5px #eee;}
      #missing-table {padding:1em;}
      /* Toujours afficher la barre de scroll horizontale */
      .table-responsive { scrollbar-color: #b00000 #ffeaea; scrollbar-width: thin; }
      .table-responsive::-webkit-scrollbar { height: 10px; background: #ffeaea; }
      .table-responsive::-webkit-scrollbar-thumb { background: #b00000; border-radius: 8px; }
      @media (max-width: 900px) {
        #pv-table {font-size:0.88em;}
        .pv-th, .pv-td {padding:4px 6px;}
      }
      @media (max-width: 700px) {
        #pv-table {font-size:0.80em; min-width:900px;}
        #missing-table {padding:0.5em;}
        .pv-th, .pv-td {padding:3px 4px;}
      }
